default_install_hook_types = [
  "pre-commit",
  "pre-push",
]

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
prority = 1

[[repos.hooks]]
id = "end-of-file-fixer"
prority = 2

[[repos]]
repo = "local"

[[repos.hooks]]
id = "actionlint"
name = "check github workflows"
entry = "actionlint"
language = "system"
pass_filenames = false
files = "^.github/"
priority = 3

[[repos.hooks]]
id = "hadolint"
name = "check dockerfile"
entry = "hadolint"
language = "system"
files = "^Dockerfile$"
priority = 3

[[repos.hooks]]
id = "tombi-check"
name = "check toml"
entry = "tombi check"
language = "system"
pass_filenames = false
types = ["toml"]
priority = 3

[[repos.hooks]]
id = "tombi-fmt"
name = "format toml"
entry = "tombi format"
language = "system"
pass_filenames = false
types = ["toml"]
priority = 4

[[repos.hooks]]
id = "clippy"
name = "clippy"
entry = "cargo clippy --fix --allow-dirty --all-targets"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 4

[[repos.hooks]]
id = "rustfmt"
name = "format rust"
entry = "cargo fmt --"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 5

[[repos.hooks]]
id = "test"
name = "test rust"
entry = "cargo test"
language = "system"
pass_filenames = false
types_or = ["markdown", "rust"]
priority = 6

[[repos.hooks]]
id = "mdlint-check"
name = "check markdown (dogfood)"
entry = "cargo run -- check"
language = "system"
pass_filenames = false
types_or = ["markdown", "rust"]
priority = 6

[[repos.hooks]]
id = "mdlint-format"
name = "format markdown (dogfood)"
entry = "cargo run -- format"
language = "system"
pass_filenames = false
types_or = ["markdown", "rust"]
priority = 7
