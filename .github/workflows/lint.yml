name: Lint

on: workflow_call

jobs:
  check-code:
    name: Check codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          cache-key: "lint"

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4
        env:
          MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

      - name: Run all codebase checks
        run: prek run -av --hook-stage pre-push

  check-npm:
    name: Verify npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          sparse-checkout: npm

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 'lts/*'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check syntax
        run: node --check bin/mdlint.js

      - name: Check package
        run: npm pack --dry-run

  check-python:
    name: Verify Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          sparse-checkout: python

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Check syntax
        run: uv run python -m py_compile mdlint/__init__.py mdlint/__main__.py

      - name: Build wheel
        run: uv build --wheel

      - name: Check package metadata
        run: uvx twine check dist/*.whl

  docker-dogfood:
    name: Docker dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          load: true
          tags: mdlint:dogfood
          cache-from: type=gha,scope=docker-dogfood
          cache-to: type=gha,mode=max,scope=docker-dogfood

      - name: Run dogfood check
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood check

      - name: Run dogfood format
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood format
