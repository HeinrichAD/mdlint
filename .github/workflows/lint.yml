name: Lint

on: workflow_call

jobs:
  check-code:
    name: Check codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659  # v1
        with:
          cache-key: "lint"

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4
        env:
          MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

      - name: Run all codebase checks
        run: prek run -av --hook-stage pre-push

  check-npm:
    name: Verify npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          sparse-checkout: npm

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 'lts/*'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check syntax
        run: node --check bin/mdlint.js

      - name: Check package
        run: npm pack --dry-run

  check-python:
    name: Verify Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          sparse-checkout: python

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Check syntax
        run: uv run python -m py_compile mdlint/__init__.py mdlint/__main__.py

      - name: Build wheel
        run: uv build --wheel

      - name: Check package metadata
        run: uvx twine check dist/*.whl

  docker-dogfood:
    name: Docker dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          load: true
          tags: mdlint:dogfood
          cache-from: type=gha,scope=docker-dogfood
          cache-to: type=gha,mode=max,scope=docker-dogfood

      - name: Run dogfood check
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood check

      - name: Run dogfood format
        run: docker run --rm -w /workspace -v "$PWD:/workspace" mdlint:dogfood format
