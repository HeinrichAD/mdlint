name: publish-container.yml
on:
  workflow_call:
    inputs:
      version:
        description: Container tag version to use
        required: true
        type: string


jobs:
  build-docker:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/mdlint
          tags: type=semver,pattern={{version}}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

  publish-docker:
    name: Publish Multi-Platform Docker Manifest
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" | tee -a "$GITHUB_OUTPUT"
          echo "major=$(echo "${VERSION}" | cut -d . -f1)" | tee -a "$GITHUB_OUTPUT"
          echo "minor=$(echo "${VERSION}" | cut -d . -f1-2)" | tee -a "$GITHUB_OUTPUT"

      - name: Create and push multi-platform manifest
        env:
          DH_REPO: docker.io/${{ vars.DOCKERHUB_USERNAME }}/mdlint
          GHCR_REPO: ghcr.io/${{ github.repository }}
        run: |
          for REPO in "${GHCR_REPO}" "${DH_REPO}"; do
            docker buildx imagetools create \
              --tag "${REPO}:${{ inputs.version }}" \
              --tag "${REPO}:${{ steps.version.outputs.minor }}" \
              --tag "${REPO}:${{ steps.version.outputs.major }}" \
              --tag "${REPO}:latest" \
              "${REPO}:${{ steps.version.outputs.version }}-amd64" \
              "${REPO}:${{ steps.version.outputs.version }}-arm64"
          done
